<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div id="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
            <input type="email" id="email" placeholder="Correo" required />
            <input type="password" id="password" placeholder="Contraseña" required />
            <button type="submit">Ingresar</button>
        </form>
        <p>¿No tienes cuenta? <a href="#" id="register-link">Regístrate aquí</a></p>
    </div>

    <div id="register-container" style="display: none;">
        <h2>Registro</h2>
        <form id="register-form">
            <input type="text" id="name" placeholder="Nombre" required />
            <input type="email" id="register-email" placeholder="Correo" required />
            <input type="password" id="register-password" placeholder="Contraseña" required />
            <input type="text" id="phone" placeholder="Teléfono" required />
            <button type="submit">Registrar</button>
        </form>
        <p>¿Ya tienes cuenta? <a href="#" id="login-link">Inicia sesión aquí</a></p>
    </div>

    <script src="./js/login.js"></script>
</body>
</html>
